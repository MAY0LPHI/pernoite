name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: './frontend/package.json'

      - name: Gerar keys.js a partir do Secret
        env:
          GEMINI_KEYS_JSON: ${{ secrets.GEMINI_KEYS_JSON }}
        run: |
          if [ -z "$GEMINI_KEYS_JSON" ]; then
            echo "❌ ERRO: Secret GEMINI_KEYS_JSON não configurado!"
            echo "Acesse: Settings → Secrets → Actions → New repository secret"
            exit 1
          fi
          node -e "
            const keys = process.env.GEMINI_KEYS_JSON;
            const content = 'export const GEMINI_KEYS = ' + keys + ';\n';
            require('fs').writeFileSync('frontend/src/lib/keys.js', content);
            console.log('keys.js gerado com ' + JSON.parse(keys).length + ' chaves.');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn --cwd frontend install

      - name: Build React App
        run: yarn --cwd frontend build
        env:
          CI: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
